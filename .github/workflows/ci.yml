name: CI

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [main, staging, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.4'

jobs:
  # ─────────────────────────────────────────────────
  # Quality checks — runs on every PR and push
  # ─────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  # ─────────────────────────────────────────────────
  # Build — verifies the app builds successfully
  # ─────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        include:
          - env: staging
            branch: staging
          - env: production
            branch: main
    # Only build for the matching branch
    if: >
      (github.ref == 'refs/heads/main' && matrix.env == 'production') ||
      (github.ref == 'refs/heads/staging' && matrix.env == 'staging') ||
      github.event_name == 'pull_request'
    env:
      NEXT_PUBLIC_APP_ENV: ${{ matrix.env }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets[format('{0}_SUPABASE_URL', matrix.env == 'production' && 'PROD' || 'STAGING')] }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets[format('{0}_SUPABASE_ANON_KEY', matrix.env == 'production' && 'PROD' || 'STAGING')] }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.env }}
          path: apps/web/.next
          retention-days: 3

  # ─────────────────────────────────────────────────
  # Migration check — warns if schema changes detected
  # ─────────────────────────────────────────────────
  migration-check:
    name: Migration Files Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check for migration changes
        id: migrations
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- 'packages/supabase/migrations/')
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::warning::⚠️ Database migration files changed. Review carefully before merging."
            echo "Changed files:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No migration changes detected."
          fi
